<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Northscale · Operations Dashboard</title>
<link rel="stylesheet" href="/styles/colors_and_type.css"/>
<link rel="stylesheet" href="/styles/dashboard.css"/>
<link rel="icon" href="/assets/logo-mark-dark.svg"/>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="/src/mock.js"></script>
<script src="/src/api.js"></script>
<script type="text/babel" src="/src/utils.jsx"></script>
<script type="text/babel" src="/src/charts.jsx"></script>
<script type="text/babel" src="/src/shell.jsx"></script>
<script type="text/babel" src="/src/pages/overview.jsx"></script>
<script type="text/babel" src="/src/pages/all-pages.jsx"></script>

<script type="text/babel" data-presets="react">
const { useState: useStateApp, useEffect: useEffectApp } = React;

// --- route ↔ metadata
const ROUTES = {
  'overview':       { title: 'Visão',       em: 'geral',       crumbs: ['Análise', 'Visão geral'] },
  'funnel':         { title: 'Funil',       em: 'completo',    crumbs: ['Análise', 'Funil'] },
  'leaderboard':    { title: 'Ranking',     em: 'de afiliados', crumbs: ['Afiliados', 'Ranking'] },
  'all-affiliates': { title: 'Diretório',   em: 'de afiliados', crumbs: ['Afiliados', 'Todos'] },
  'products':       { title: 'Produtos',     em: '',            crumbs: ['Catálogo', 'Produtos'] },
  'transactions':   { title: 'Transações',  em: 'do ledger',   crumbs: ['Catálogo', 'Transações'] },
  'platforms':      { title: 'Plataformas', em: 'conectadas',  crumbs: ['Sistema', 'Plataformas'] },
  'health':         { title: 'Saúde',       em: 'do dado',     crumbs: ['Sistema', 'Saúde do dado'] },
  'costs':          { title: 'Custos',      em: 'da operação', crumbs: ['Sistema', 'Custos'] },
  'insights':       { title: 'Insights',    em: 'do negócio',  crumbs: ['Análise', 'Insights'] },
};

// Path-based routing via History API. Pathname is the route name (e.g.
// "/leaderboard"); querystring carries filter state. We also accept the
// legacy hash format ("#leaderboard?...") so old bookmarks keep working —
// when detected, we silently rewrite the URL to the clean form on first
// load.
function readRoute() {
  // Legacy hash bookmark: "/index.html#leaderboard?range=30d" or "/#funnel"
  if (location.hash) {
    const h = location.hash.replace(/^#/, '');
    const [route, q] = h.split('?');
    if (ROUTES[route]) {
      const params = new URLSearchParams(q || '');
      // Rewrite to the clean URL — keep the same browser entry, no reload.
      const newUrl = '/' + route + (q ? '?' + q : '');
      history.replaceState(null, '', newUrl);
      return { route, params };
    }
  }
  let path = location.pathname.replace(/^\//, '').replace(/\/$/, '');
  // /index.html (legacy direct hit) redirects to clean root.
  if (path === 'index.html') {
    history.replaceState(null, '', '/' + location.search);
    path = '';
  }
  const route = ROUTES[path] ? path : 'overview';
  const params = new URLSearchParams(location.search);
  return { route, params };
}
function writeRoute(route, params) {
  const qs = params.toString();
  const url = '/' + route + (qs ? '?' + qs : '');
  history.pushState(null, '', url);
}

function decodeSet(s) { return new Set(s ? s.split(',').filter(Boolean) : []); }
function encodeSet(set) { return Array.from(set).join(','); }

function App() {
  const [hashState, setHashState] = useStateApp(readRoute());
  const [filterOptions, setFilterOptions] = useStateApp(null);

  // popstate fires on browser back/forward. We re-read the URL and update
  // route + filter state. Hash changes still get caught (legacy bookmarks)
  // because readRoute() handles both forms.
  useEffectApp(() => {
    const fn = () => setHashState(readRoute());
    window.addEventListener('popstate', fn);
    return () => window.removeEventListener('popstate', fn);
  }, []);

  // Load real filter options once on mount. We don't refresh on every
  // navigation — the universe of platforms/funnels/countries changes only
  // when new orders arrive, which is rare relative to user interaction.
  useEffectApp(() => {
    window.NSApi.fetchFilterOptions()
      .then((data) => setFilterOptions(data))
      .catch((err) => console.error('fetchFilterOptions failed', err));
  }, []);

  const params = hashState.params;
  const initialPreset = params.get('range') || '30d';
  // For custom ranges, the preset is 'custom' and the actual dates come from
  // 'from'/'to' params (YYYY-MM-DD). If they're missing or malformed, fall
  // back to the 30d default so the page still loads.
  const initialRange = (() => {
    if (initialPreset === 'custom') {
      const fromRaw = params.get('from');
      const toRaw = params.get('to');
      const start = fromRaw ? new Date(fromRaw + 'T00:00:00.000Z') : null;
      const end = toRaw ? new Date(toRaw + 'T23:59:59.999Z') : null;
      if (start && end && !Number.isNaN(start.getTime()) && !Number.isNaN(end.getTime()) && start <= end) {
        return { start, end, preset: 'custom' };
      }
      return rangeForPreset('30d');
    }
    return rangeForPreset(initialPreset);
  })();

  const [filters, setFilters] = useStateApp(() => ({
    preset: initialRange.preset || initialPreset,
    dateRange: initialRange,
    compare: params.get('cmp') === '1',
    platforms: decodeSet(params.get('plat')),
    funnels: decodeSet(params.get('of')),
    families: decodeSet(params.get('fam')),
    countries: decodeSet(params.get('co')),
    // Retained for backward-compat with pages still reading filters.trafficSources / filters.currency.
    // Both removed from FilterBar UI + URL persistence in Fase 2A cleanup.
    trafficSources: new Set(),
    currency: 'USD',
  }));

  // persist filters to URL via replaceState (no new history entry — typing
  // in a filter shouldn't litter back-button history).
  useEffectApp(() => {
    const p = new URLSearchParams();
    if (filters.preset !== '30d') p.set('range', filters.preset);
    if (filters.preset === 'custom') {
      p.set('from', isoDateOnly(filters.dateRange.start));
      p.set('to', isoDateOnly(filters.dateRange.end));
    }
    if (filters.compare) p.set('cmp', '1');
    if (filters.platforms.size) p.set('plat', encodeSet(filters.platforms));
    if (filters.funnels.size) p.set('of', encodeSet(filters.funnels));
    if (filters.families.size) p.set('fam', encodeSet(filters.families));
    if (filters.countries.size) p.set('co', encodeSet(filters.countries));
    const qs = p.toString();
    const desiredUrl = '/' + hashState.route + (qs ? '?' + qs : '');
    const currentUrl = location.pathname + location.search;
    if (currentUrl !== desiredUrl) {
      history.replaceState(null, '', desiredUrl);
    }
  }, [filters, hashState.route]);

  const [drawerAff, setDrawerAff] = useStateApp(null);

  function onNav(route) {
    setDrawerAff(null);
    // Preserve current querystring (filter state) when switching routes.
    writeRoute(route, new URLSearchParams(location.search));
    setHashState({ route, params: new URLSearchParams(location.search) });
  }

  const r = ROUTES[hashState.route];

  return (
    <div className="app">
      <FXLayers/>
      <Sidebar active={hashState.route} onNav={onNav}/>
      <div className="main">
        <Topbar
          title={r.title} titleEm={r.em} crumbs={r.crumbs}
          currency={filters.currency}
          onToggleCurrency={(c) => setFilters(f => ({ ...f, currency: c }))}
        />
        <FilterBar filters={filters} setFilters={setFilters} options={filterOptions} route={hashState.route}/>
        <div className="page">
          {hashState.route === 'overview'       && <OverviewPage filters={filters}/>}
          {hashState.route === 'funnel'         && <FunnelPage filters={filters}/>}
          {hashState.route === 'leaderboard'    && <LeaderboardPage filters={filters} onOpenAffiliate={setDrawerAff}/>}
          {hashState.route === 'all-affiliates' && <AllAffiliatesPage filters={filters} onOpenAffiliate={setDrawerAff}/>}
          {hashState.route === 'products'       && <ProductsPage filters={filters}/>}
          {hashState.route === 'transactions'   && <TransactionsPage filters={filters}/>}
          {hashState.route === 'platforms'      && <IntegrationsPage filters={filters}/>}
          {hashState.route === 'health'         && <HealthPage/>}
          {hashState.route === 'costs'          && <CostsPage/>}
          {hashState.route === 'insights'       && <InsightsPage/>}
        </div>
      </div>

      {drawerAff && <AffiliateDrawer affiliateId={drawerAff} filters={filters} onClose={() => setDrawerAff(null)}/>}
    </div>
  );
}

const root = ReactDOM.createRoot(document.getElementById('app'));
root.render(<App/>);
</script>
</body>
</html>
