<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=1440"/>
<title>Northscale · Operations Dashboard</title>
<link rel="stylesheet" href="/styles/colors_and_type.css"/>
<link rel="stylesheet" href="/styles/dashboard.css"/>
<!-- flag-icons via CDN: SVG flags consistentes cross-platform.
     Usado no card "Receita por país" do Overview. ~30kb gzip total. -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flag-icons@7.2.3/css/flag-icons.min.css"/>
<link rel="icon" href="/assets/logo-mark-dark.svg"/>
<script>
  // Aplica o tema antes do React montar pra evitar flash do tema errado.
  // Persistido em localStorage; default = dark (preserva identidade da marca).
  (function() {
    try {
      var saved = localStorage.getItem('ns-theme');
      var theme = saved === 'light' || saved === 'dark' ? saved : 'dark';
      document.documentElement.setAttribute('data-theme', theme);
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
</head>
<body>
<div id="app"></div>

<!-- React production self-hosted (public/vendor/): elimina dependência do
     unpkg em prod e o dev build (~2x maior e mais lento em render). -->
<script src="/vendor/react.production.min.js"></script>
<script src="/vendor/react-dom.production.min.js"></script>
<!-- Markdown rendering pro chat IA (admin-only feature). marked converte
     md → HTML, DOMPurify sanitiza pra prevenir XSS mesmo do nosso próprio
     conteúdo. Loaded sob demanda — usar window.marked e window.DOMPurify. -->
<script src="https://cdn.jsdelivr.net/npm/marked@14.1.3/marked.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>

<!-- JSX pré-compilado em build time (scripts/build-spa.mjs → public/dist/).
     O Babel standalone que transpilava tudo no browser foi removido.
     A ORDEM importa: classic scripts compartilham escopo global. -->
<script src="/src/mock.js"></script>
<script src="/src/api.js"></script>
<script src="/dist/utils.js"></script>
<script src="/dist/charts.js"></script>
<script src="/dist/shell.js"></script>
<script src="/dist/pages/overview.js"></script>
<script src="/dist/pages/custos.js"></script>
<script src="/dist/pages/all-pages.js"></script>
<script src="/dist/app.js"></script>
</body>
</html>
